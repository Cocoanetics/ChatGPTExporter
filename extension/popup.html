<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Export ChatGPT Chat</h1>

  <div class="actions">
    <button id="download" type="button" title="Hold ⌥ Option to download raw JSON instead">Download</button>
    <button id="copy" type="button" class="secondary" title="Hold ⌥ Option to copy raw JSON instead">Copy</button>
  </div>

  <label class="row">
    <input type="checkbox" id="files">
    Download Files (images, PDFs, … into a folder)
  </label>

  <progress id="progress" class="hidden" value="0" max="1"></progress>

  <p id="status" class="muted">Open a ChatGPT conversation, then Download or Copy. (⌥ for raw JSON)</p>

  <!-- exporter.js defines pageExport() (injected into the page); export-core.js
       has the shared Markdown/native helpers. Both load before popup.js. -->
  <script src="exporter.js"></script>
  <script src="export-core.js"></script>
  <script src="popup.js"></script>
</body>
</html>
